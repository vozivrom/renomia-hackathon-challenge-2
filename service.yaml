apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: __SERVICE_NAME__
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/container-dependencies: '{"app":["db"]}'
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: __PARTICIPANT_SA__
      containers:
        - name: app
          image: __APP_IMAGE__
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "postgresql://hackathon:hackathon@localhost:5432/hackathon"
            - name: GEMINI_API_KEY
              value: "__GEMINI_API_KEY__"
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 10
        - name: db
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              value: hackathon
            - name: POSTGRES_PASSWORD
              value: hackathon
            - name: POSTGRES_DB
              value: hackathon
          resources:
            limits:
              memory: 256Mi
              cpu: "0.5"
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
          startupProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 0
            periodSeconds: 2
            failureThreshold: 15
      volumes:
        - name: pg-data
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
